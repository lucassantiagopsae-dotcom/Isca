<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget de Teste - Playbook Rugido</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0714;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .widget-container {
            background: #231431;
            border: 2px solid #3D2B4A;
            border-radius: 16px;
            padding: 32px;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(13, 7, 20, .85);
            }
        h1 {
            margin: 0 0 20px;
            font-size: 24px;
            font-weight: 600;
            color: #7A32C7;
            text-align: center;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }
        .form-label {
            font-size: 14px;
            font-weight: 500;
            color: #9D78E9;
            text-align: left;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #3D2B4A;
            border-radius: 8px;
            background: rgba(122, 50, 199, 0.1);
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-input:focus {
            outline: none;
            border-color: #7A32C7;
            box-shadow: 0 0 0 3px rgba(122, 50, 199, 0.3);
        }
        .submit-btn {
            background: linear-gradient(135deg, #7A32C7, #9D78E9);
            border: none;
            border-radius: 8px;
            padding: 14px 24px;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .submit-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px 40px rgba(122, 50, 199, 0.3);
        }
        .submit-btn:active {
            transform: scale(0.95);
        }
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .status.success {
            background: rgba(77, 255, 128, 0.15);
            border: 1px solid #4DFFB4;
            color: #4DFFB4;
        }
        .status.error {
            background: rgba(255, 77, 128, 0.15);
            border: 1px solid #FF7A7A;
            color: #FF7A7A;
        }
        .log {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #3D2B4A;
            border-radius: 8px;
            padding: 16px;
            margin-top: 24px;
            text-align: left;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #9D78E9;
            max-height: 200px;
            overflow-y: auto;
        }
        .log-entry {
            margin-bottom: 8px;
            padding: 8px;
            border-bottom: 1px solid rgba(61, 43, 74, 0.15);
        }
        .log-entry:last-child {
            margin-bottom: 0;
        }
        .log-time {
            color: #7A32C7;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .log-content {
            color: #9D78E9;
            font-size: 13px;
        }
        .log-content.error {
            color: #FF7A7A;
        }
        .log-content.success {
            color: #4DFFB4;
        }
        .close-btn {
            background: transparent;
            border: 1px solid rgba(157, 120, 233, 0.2);
            border-radius: 6px;
            padding: 4px 12px;
            color: rgba(157, 120, 233, 0.7);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .close-btn:hover {
            background: rgba(157, 120, 233, 0.3);
            color: #fff;
        }
        @media (max-width: 600px) {
            .widget-container {
                width: 100%;
                max-width: 100%;
            }
            .form-input {
                padding: 10px 12px;
            }
            .log {
                max-height: 150px;
            font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <h1>🎯 Widget de Teste - Playbook Rugido</h1>
        
        <div class="form-group">
            <div class="form-label">Nome completo *</div>
            <input type="text" class="form-input" id="test-nome" placeholder="Seu nome">
            
            <div class="form-label">E-mail *</div>
            <input type="email" class="form-input" id="test-email" placeholder="seu@email.com">
            
            <button type="submit" class="submit-btn" onclick="submitForm()">
                Enviar Teste
            </button>
        </div>

        <div class="status" id="status-display">
            <div class="status-icon">⏳</div>
            <div class="status-text" id="status-text">Aguardando...</div>
        </div>

        <div class="log" id="log-display">
            <div class="log-entry">
                <div class="log-time">--:--</div>
                <div class="log-content">Aguardando logs...</div>
            </div>
        </div>

        <div class="close-btn" onclick="closeWidget()" style="margin-top: 20px;">
            ✕ Fechar Widget
        </div>
    </div>

    <script>
        const API_URL = 'https://gruporugido.com/wp-json/wp/v2/posts';

        // Logs
        function addLog(message, type = 'info') {
            const logDisplay = document.getElementById('log-display');
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            
            const logTime = document.createElement('div');
            logTime.className = 'log-time';
            logTime.textContent = '--:--';
            
            const logContent = document.createElement('div');
            logContent.className = `log-content ${type}`;
            logContent.textContent = message;
            
            logEntry.appendChild(logTime);
            logEntry.appendChild(logContent);
            logDisplay.appendChild(logEntry);
            
            scrollToBottom(logDisplay);
        }

        function scrollToBottom(element) {
            element.scrollTop = element.scrollHeight;
        }

        function closeWidget() {
            document.getElementById('widget-container').style.display = 'none';
        }

        async function submitForm() {
            const statusText = document.getElementById('status-text');
            const statusIcon = document.querySelector('.status-icon');
            const statusDisplay = document.getElementById('status-display');
            
            // Limpa logs anteriores
            document.querySelectorAll('.log-entry').forEach(entry => entry.remove());
            addLog('Iniciando teste de formulário...', 'info');

            try {
                statusText.textContent = 'Enviando para Supabase...';
                statusIcon.textContent = '⏳';
                statusDisplay.className = 'status';
                
                // Coletar dados
                const leadData = {
                    nome: document.getElementById('test-nome').value,
                    email: document.getElementById('test-email').value
                };

                // Enviar para Supabase (simulação)
                const response = await fetch(`${API_URL}?action=insert_lead`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: JSON.stringify(leadData)
                });

                const result = await response.json();

                if (result.success) {
                    addLog('✅ Dados enviados com sucesso!', 'success');
                    statusText.textContent = '✅ Enviado com sucesso!';
                    statusIcon.textContent = '✅';
                    statusDisplay.className = 'status success';
                } else {
                    addLog('❌ Erro ao enviar dados', 'error');
                    statusText.textContent = '❌ Erro ao enviar!';
                    statusIcon.textContent = '❌';
                    statusDisplay.className = 'status error';
                }

            } catch (error) {
                addLog(`❌ Erro na requisição: ${error.message}`, 'error');
                statusText.textContent = '❌ Erro de conexão!';
                statusIcon.textContent = '❌';
                statusDisplay.className = 'status error';
            }
        }

        // Inicializa
        document.addEventListener('DOMContentLoaded', () => {
            addLog('🔍 Widget carregado e pronto para testes', 'info');
        });
    </script>
</body>
</html>
